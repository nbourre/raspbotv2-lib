name: Publish to PyPI

on:
  push:
    tags:
      - "v*"   # triggers on v0.1.1, v1.0.0, etc.

jobs:
  # -----------------------------------------------------------------------
  # Run the full test suite first -- publish only if tests pass
  # -----------------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v

  # -----------------------------------------------------------------------
  # Build the wheel and sdist
  # -----------------------------------------------------------------------
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test   # only runs if all test matrix jobs passed

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tools
        run: pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Validate with twine
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # -----------------------------------------------------------------------
  # Publish to PyPI
  # -----------------------------------------------------------------------
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build   # only runs if build passed
    environment: pypi   # optional: add a GitHub "pypi" environment for protection rules
    permissions:
      id-token: write   # required for Trusted Publisher (OIDC)

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
